{{- if eq .Values.routing.type "gatewayapi" }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "mxid.fullname" . }}
  labels:
    {{- include "mxid.labels" . | nindent 4 }}
spec:
  # Reference to the existing Gateway (not created by this chart).
  # Configure via routing.gatewayapi.* in values.
  parentRefs:
    - name: {{ .Values.routing.gatewayapi.name | quote }}
      {{- if .Values.routing.gatewayapi.namespace }}
      namespace: {{ .Values.routing.gatewayapi.namespace | quote }}
      {{- end }}
      {{- if .Values.routing.gatewayapi.sectionName }}
      sectionName: {{ .Values.routing.gatewayapi.sectionName | quote }}
      {{- end }}
  hostnames:
    - {{ .Values.host | quote }}
  rules:
    # Backend API routes — /api prefix
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: mxid
          port: 8080

    # OIDC/SAML/CAS protocol endpoints
    - matches:
        - path:
            type: PathPrefix
            value: /protocol
      backendRefs:
        - name: mxid
          port: 8080

    # Static files served directly by the backend
    - matches:
        - path:
            type: PathPrefix
            value: /static
      backendRefs:
        - name: mxid
          port: 8080

    # OpenAPI spec endpoints
    - matches:
        - path:
            type: PathPrefix
            value: /openapi
      backendRefs:
        - name: mxid
          port: 8080

    # Health check endpoint
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: mxid
          port: 8080

    # Catch-all — serve the web SPA
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mxid-web
          port: 80
{{- end }}
