apiVersion: v1
kind: Service
metadata:
  name: mxid-web
  labels:
    {{- include "mxid.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    {{- include "mxid.webSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
