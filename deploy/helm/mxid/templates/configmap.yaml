apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mxid.fullname" . }}
  labels:
    {{- include "mxid.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  # Server configuration
  MXID_CONFIG_ENV: "prod"
  MXID_SERVER_PORT: "8080"
  MXID_SERVER_MODE: {{ .Values.config.serverMode | quote }}
  MXID_SERVER_ALLOWED_ORIGINS: {{ .Values.config.allowedOrigins | quote }}

  # Database connection (non-sensitive fields only — password is in the Secret)
  MXID_DATABASE_HOST: {{ .Values.database.host | quote }}
  MXID_DATABASE_PORT: {{ .Values.database.port | quote }}
  MXID_DATABASE_NAME: {{ .Values.database.name | quote }}
  MXID_DATABASE_USER: {{ .Values.database.user | quote }}

  # Redis connection (non-sensitive fields only — password is in the Secret)
  MXID_REDIS_HOST: {{ .Values.redis.host | quote }}
  MXID_REDIS_PORT: {{ .Values.redis.port | quote }}
