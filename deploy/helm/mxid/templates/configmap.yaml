apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mxid.fullname" . }}
  labels:
    {{- include "mxid.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  # Server configuration
  MXID_CONFIG_ENV: "prod"
  MXID_SERVER_PORT: "8080"
  MXID_SERVER_MODE: {{ .Values.config.serverMode | quote }}
  {{- $origins := .Values.config.allowedOrigins | default (printf "https://%s" .Values.host) }}
  {{- if .Values.config.formFillExtension }}
  {{- $origins = printf "%s,chrome-extension://bfdbncnhgjdbaeipacekokclgbkhlpic" $origins }}
  {{- end }}
  MXID_SERVER_ALLOWED_ORIGINS: {{ $origins | quote }}
  {{- with .Values.config.trustedProxies }}
  # Reverse-proxy / internal-LB CIDRs whose X-Forwarded-For is trusted, so the
  # real client IP is resolved instead of the LB IP. Narrow to the edge only.
  MXID_SERVER_TRUSTED_PROXIES: {{ join "," . | quote }}
  {{- end }}
  {{- if .Values.config.formFillExtension }}
  # Form-fill SSO browser extension (MXID Login): its cross-site fetch to the
  # credential-reveal endpoint needs the portal session cookie as SameSite=None
  # (requires HTTPS + session.cookieSecure), and its chrome-extension:// origin
  # allow-listed (appended to ALLOWED_ORIGINS above). Enable ONLY when running
  # the extension — it slightly widens CSRF surface.
  MXID_SESSION_CROSS_SITE_COOKIES: "true"
  {{- end }}

  # Canonical external URLs — blank values derive from .Values.host. These drive
  # the OIDC issuer / SAML EntityID / CAS root and CORS/CSRF auto-trust, so a
  # deploy no longer boots with the baked config.prod.yaml placeholder.
  MXID_SERVER_ISSUER_URL: {{ .Values.config.issuerUrl | default (printf "https://%s" .Values.host) | quote }}
  MXID_SERVER_PORTAL_URL: {{ .Values.config.portalUrl | default (printf "https://%s" .Values.host) | quote }}
  MXID_SERVER_CONSOLE_URL: {{ .Values.config.consoleUrl | default (printf "https://%s/admin" .Values.host) | quote }}

  # Database connection (non-sensitive fields only — password is in the Secret)
  MXID_DATABASE_HOST: {{ .Values.database.host | quote }}
  MXID_DATABASE_PORT: {{ .Values.database.port | quote }}
  MXID_DATABASE_NAME: {{ .Values.database.name | quote }}
  MXID_DATABASE_USER: {{ .Values.database.user | quote }}

  # Redis connection (non-sensitive fields only — password is in the Secret)
  MXID_REDIS_HOST: {{ .Values.redis.host | quote }}
  MXID_REDIS_PORT: {{ .Values.redis.port | quote }}
