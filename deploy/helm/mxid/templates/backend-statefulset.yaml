apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "mxid.fullname" . }}
  labels:
    {{- include "mxid.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  # serviceName must match the headless Service name for stable pod DNS.
  serviceName: mxid-headless
  replicas: {{ .Values.backend.replicaCount }}
  {{- if .Values.audit.anchorSink.enabled }}
  # Retain the audit anchor-sink PVCs on StatefulSet deletion (helm uninstall)
  # AND on scale-down, so the external audit-anchor evidence is never lost with
  # the pod. Retain is the Kubernetes default; set explicitly to guard intent.
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  {{- end }}
  selector:
    matchLabels:
      {{- include "mxid.backendSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mxid.backendSelectorLabels" . | nindent 8 }}
        app.kubernetes.io/version: {{ .Values.image.tag | default .Chart.AppVersion | quote }}
        {{- with .Values.backend.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Roll pods when the ConfigMap changes (checksum annotation).
        checksum/configmap: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.backend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.backend.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.backend.waitForDeps.enabled }}
      # Block startup until Postgres + Redis accept TCP connections, so the pod
      # waits in Init instead of the main container crash-looping (the app
      # fail-fasts on an unreachable DB/Redis at boot). Just a TCP reachability
      # gate — the app still does the real auth/ping on connect.
      initContainers:
        - name: wait-for-deps
          image: {{ .Values.backend.waitForDeps.image }}
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.database.host }} {{ .Values.database.port }}; do
                echo "waiting for postgres {{ .Values.database.host }}:{{ .Values.database.port }}..."; sleep 2;
              done
              until nc -z {{ .Values.redis.host }} {{ .Values.redis.port }}; do
                echo "waiting for redis {{ .Values.redis.host }}:{{ .Values.redis.port }}..."; sleep 2;
              done
              echo "postgres + redis reachable"
          {{- with .Values.backend.waitForDeps.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- end }}
      containers:
        - name: backend
          image: {{ include "mxid.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Override the default CMD to inject a unique Snowflake nodeID derived
          # from the pod ordinal. HOSTNAME is set by Kubernetes to the pod name
          # (e.g. release-mxid-0); ${HOSTNAME##*-} strips everything up to the
          # last '-', leaving the ordinal (0, 1, 2, …).
          command:
            - sh
            - -c
            - |
              export MXID_SNOWFLAKE_NODE_ID=${HOSTNAME##*-}
              exec ./mxid -config configs
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          # Non-sensitive configuration from ConfigMap
          envFrom:
            - configMapRef:
                name: {{ include "mxid.fullname" . }}
          # Sensitive configuration from Secret (individual keys to avoid
          # accidental exposure of other keys if the Secret grows)
          env:
            - name: MXID_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mxid.secretName" . }}
                  key: MXID_DATABASE_PASSWORD
            - name: MXID_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mxid.secretName" . }}
                  key: MXID_REDIS_PASSWORD
            - name: MXID_CRYPTO_KEY_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mxid.secretName" . }}
                  key: MXID_CRYPTO_KEY_ENCRYPTION_KEY
            - name: MXID_CRYPTO_AUDIT_CHAIN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mxid.secretName" . }}
                  key: MXID_CRYPTO_AUDIT_CHAIN_KEY
            - name: MXID_CRYPTO_AUDIT_ANCHOR_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "mxid.secretName" . }}
                  key: MXID_CRYPTO_AUDIT_ANCHOR_KEY
            {{- if .Values.audit.anchorSink.enabled }}
            # Anchor sink lives on the mounted PersistentVolume (the pod
            # filesystem is ephemeral). Written only by the leader replica.
            - name: MXID_AUDIT_ANCHOR_ENABLED
              value: "true"
            - name: MXID_AUDIT_ANCHOR_SINK_PATH
              value: {{ .Values.audit.anchorSink.path | quote }}
            {{- end }}
          {{- if .Values.audit.anchorSink.enabled }}
          volumeMounts:
            - name: audit-anchor-sink
              mountPath: {{ .Values.audit.anchorSink.mountPath | quote }}
          {{- end }}
          # Liveness = "is the process alive" → the cheap /health (no dep check),
          # so a DB/Redis blip never restarts the pod.
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          # Readiness = "can this pod serve" → /readyz pings DB + Redis (503 if
          # either is down), so an unhealthy pod is pulled from the Service.
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          {{- if gt (int .Values.backend.preStopSleep) 0 }}
          # Delay SIGTERM so Service/mesh endpoint removal propagates before the
          # process drains — prevents dropped requests on rollout / scale-down.
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep {{ .Values.backend.preStopSleep }}"]
          {{- end }}
          {{- with .Values.backend.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.audit.anchorSink.enabled }}
  # The backend is otherwise stateless (data lives in PostgreSQL and Redis), but
  # the tamper-proof audit anchor sink needs durable local storage: the pod
  # filesystem is ephemeral, and losing the external anchor copy defeats the
  # "catch a full DB compromise against the external record" guarantee. A
  # per-ordinal PVC (StatefulSet reattaches the same PVC to the same pod across
  # restarts/reschedules) persists it. Only the leader replica writes.
  volumeClaimTemplates:
    - metadata:
        name: audit-anchor-sink
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.audit.anchorSink.persistence.storageClass }}
        storageClassName: {{ .Values.audit.anchorSink.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.audit.anchorSink.persistence.size | quote }}
  {{- end }}
