{{- if .Values.secrets.create }}
{{- /*
  Preserve-existing: when secrets.preserveExisting is true (default), look up the
  Secret already in the cluster and reuse its per-key values. This makes
  create=true IDEMPOTENT — a repeat `helm install`/`upgrade` (even after an
  uninstall that kept the Secret via helm.sh/resource-policy) never overwrites
  the irreplaceable KEK / audit-chain key, whatever the values say. First
  install (Secret absent) uses the provided values. Set preserveExisting=false
  to force the values to win (e.g. to intentionally rotate a password).
  NOTE: `lookup` returns nothing during `helm template` / `--dry-run` (no API
  access), so a dry run renders the values, not the preserved contents.
*/}}
{{- $name := include "mxid.fullname" . }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $name) }}
{{- $existingData := dict }}
{{- if and .Values.secrets.preserveExisting $existing $existing.data }}
{{- $existingData = $existing.data }}
{{- end }}
{{- /*
  Fail early (clear message) instead of crash-looping the pod on the release-mode
  secret validators (internal/bootstrap/config.go). A key is satisfied if it is
  in values OR already preserved in the existing Secret.
*/}}
{{- if eq .Values.config.serverMode "release" }}
{{- if not (or .Values.secrets.cryptoKeyEncryptionKey (hasKey $existingData "MXID_CRYPTO_KEY_ENCRYPTION_KEY")) }}
{{- fail "secrets.cryptoKeyEncryptionKey is required in release mode. Generate one: openssl rand -base64 32 (or set secrets.create=false and provide secrets.existingSecret)." }}
{{- end }}
{{- if not (or .Values.secrets.databasePassword (hasKey $existingData "MXID_DATABASE_PASSWORD")) }}
{{- fail "secrets.databasePassword is required in release mode (dev placeholders are rejected at boot). Set a strong password or use secrets.existingSecret." }}
{{- end }}
{{- if not (or .Values.secrets.redisPassword (hasKey $existingData "MXID_REDIS_PASSWORD")) }}
{{- fail "secrets.redisPassword is required in release mode (the app rejects an empty Redis password). Set one or use secrets.existingSecret." }}
{{- end }}
{{- if not (or .Values.secrets.auditChainKey (hasKey $existingData "MXID_CRYPTO_AUDIT_CHAIN_KEY")) }}
{{- fail "secrets.auditChainKey is required in release mode (the tamper-proof audit chain is insecure without it). Generate one: openssl rand -base64 32." }}
{{- end }}
{{- if and .Values.audit.anchorSink.enabled (not (or .Values.secrets.auditAnchorKey (hasKey $existingData "MXID_CRYPTO_AUDIT_ANCHOR_KEY"))) }}
{{- fail "secrets.auditAnchorKey is required when audit.anchorSink.enabled (validateSecrets fails closed otherwise). Generate one: openssl rand -base64 32, or set audit.anchorSink.enabled=false." }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "mxid.labels" . | nindent 4 }}
  {{- if .Values.secrets.keepOnUninstall }}
  annotations:
    # Retain this Secret on `helm uninstall` so a temporary uninstall/reinstall
    # cannot destroy the irreplaceable KEK + audit-chain key (losing them makes
    # encrypted data undecryptable and the audit chain unverifiable — see
    # docs/DEPLOYMENT.md). Combined with secrets.preserveExisting, a reinstall
    # with create=true adopts and preserves this Secret's contents unchanged.
    "helm.sh/resource-policy": keep
  {{- end }}
type: Opaque
stringData:
  {{- $vals := dict
      "MXID_DATABASE_PASSWORD" .Values.secrets.databasePassword
      "MXID_REDIS_PASSWORD" .Values.secrets.redisPassword
      "MXID_CRYPTO_KEY_ENCRYPTION_KEY" .Values.secrets.cryptoKeyEncryptionKey
      "MXID_CRYPTO_AUDIT_CHAIN_KEY" .Values.secrets.auditChainKey
      "MXID_CRYPTO_AUDIT_ANCHOR_KEY" .Values.secrets.auditAnchorKey }}
  {{- range $k, $v := $vals }}
  {{ $k }}: {{ if hasKey $existingData $k }}{{ index $existingData $k | b64dec | quote }}{{ else }}{{ $v | quote }}{{ end }}
  {{- end }}
{{- end }}
