{{- if .Values.secrets.create }}
{{- /*
  Fail the install/upgrade early (clear message) instead of letting the pod
  crash-loop on the release-mode secret validators. Only enforced in release
  mode — the app rejects empty/dev KEK, DB and Redis passwords there
  (internal/bootstrap/config.go). Redis auth is required in release too, so an
  empty redisPassword is a mistake, not "no auth".
*/}}
{{- if eq .Values.config.serverMode "release" }}
{{- if not .Values.secrets.cryptoKeyEncryptionKey }}
{{- fail "secrets.cryptoKeyEncryptionKey is required in release mode. Generate one: openssl rand -base64 32 (or set secrets.create=false and provide secrets.existingSecret)." }}
{{- end }}
{{- if not .Values.secrets.databasePassword }}
{{- fail "secrets.databasePassword is required in release mode (dev placeholders are rejected at boot). Set a strong password or use secrets.existingSecret." }}
{{- end }}
{{- if not .Values.secrets.redisPassword }}
{{- fail "secrets.redisPassword is required in release mode (the app rejects an empty Redis password). Set one or use secrets.existingSecret." }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mxid.fullname" . }}
  labels:
    {{- include "mxid.labels" . | nindent 4 }}
type: Opaque
stringData:
  MXID_DATABASE_PASSWORD: {{ .Values.secrets.databasePassword | quote }}
  MXID_REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}
  MXID_CRYPTO_KEY_ENCRYPTION_KEY: {{ .Values.secrets.cryptoKeyEncryptionKey | quote }}
{{- end }}
