# MXID — nginx dev config
#
# Single port (`:3500` on the host) fronting three upstreams in the same
# docker network:
#
#   mxid           — Go backend, container port 10050
#   console-vite   — vite dev server for the admin SPA, container port 5173
#   portal-vite    — vite dev server for the portal SPA, container port 5174
#
# Routing matches the Keycloak / TopIAM convention:
#
#   /admin/...        → console SPA
#   /admin/@vite/...  → console SPA (HMR WebSocket)
#   /api/v1/...       → backend REST
#   /protocol/...     → backend SSO endpoints (OIDC/SAML/CAS)
#   /static/...       → backend static (mostly CAS/SAML XML, asset uploads)
#   /health           → backend liveness
#   /...              → portal SPA (fallback — anything not claimed above)
#
# Prod mirrors this exactly (see prod.conf), so the same URL scheme works
# unchanged between local dev and a real domain.

# Docker's embedded DNS lives at 127.0.0.11. We resolve upstream names
# LAZILY (variable in proxy_pass forces per-request DNS) so nginx starts
# even if mxid / console-vite / portal-vite are still warming up.
resolver 127.0.0.11 valid=10s ipv6=off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 50m;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;

    # ---- Backend REST ----
    location /api/ {
        set $backend "http://mxid:10050";
        proxy_pass $backend;
    }
    location /protocol/ {
        set $backend "http://mxid:10050";
        proxy_pass         $backend;
        proxy_http_version 1.1;
        # Re-declare server-level headers: nginx drops inherited proxy_set_header
        # the moment ANY proxy_set_header is set inside the location block.
        # Without these, the backend sees Host=mxid:10050 and the SAML/OIDC
        # metadata entityID gets mangled.
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
    location /static/ {
        set $backend "http://mxid:10050";
        proxy_pass $backend;
    }
    location = /health {
        set $backend "http://mxid:10050";
        proxy_pass $backend;
    }

    # ---- Console SPA (vite dev, HMR ws under /admin/) ----
    location /admin/ {
        set $upstream "http://console-vite:5173";
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
    }
    location = /admin {
        return 301 /admin/;
    }

    # ---- Portal SPA (vite dev) — root catch-all ----
    location / {
        set $upstream "http://portal-vite:5174";
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
    }
}
