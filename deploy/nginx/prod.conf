# MXID — nginx prod config
#
# Topology:
#
#   nginx pod     — TLS terminate, gzip, sendfile, etag, serves SPA static
#                   files mounted as volumes; reverse-proxies API + protocol
#                   to the backend pod.
#   backend pod   — Go binary, plain HTTP on :8080, no static files.
#
# Mount layout (volumes / configmaps):
#   /var/www/mxid/console  ← console build output  (pnpm --filter @mxid/console build)
#   /var/www/mxid/portal   ← portal build output   (pnpm --filter @mxid/portal build)
#   /etc/nginx/cert/       ← TLS cert + key
#
# Routing matches dev.conf so the same URL scheme works in both envs:
#
#   /admin/...        → console SPA (with SPA fallback)
#   /api/v1/...       → backend
#   /protocol/...     → backend (OIDC/SAML/CAS)
#   /static/...       → backend
#   /health           → backend
#   /...              → portal SPA (with SPA fallback)

upstream mxid_backend {
    # Backend service address. In docker compose this is the service name on
    # the prod port (8080); in Kubernetes, the Service DNS.
    server mxid:8080;
}

# Lift WebSocket upgrade once so any location can reuse it.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---- HTTP → HTTPS redirect ----
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt / acme.sh challenge — handle this BEFORE the redirect.
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${SERVER_NAME};

    ssl_certificate     /etc/nginx/cert/${CERT_FILE};
    ssl_certificate_key /etc/nginx/cert/${KEY_FILE};
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # CSP intentionally relaxed for the SPA; tighten per-site.
    # add_header Content-Security-Policy  "default-src 'self'; ..."  always;

    client_max_body_size 50m;

    # ---- gzip ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml;

    # ---- Common proxy headers ----
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;

    # ---- Backend REST ----
    location /api/      { proxy_pass http://mxid_backend; }
    location /protocol/ {
        proxy_pass         http://mxid_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
    }
    location /static/   { proxy_pass http://mxid_backend; }
    location = /health  { proxy_pass http://mxid_backend; }
    location = /api/v1/system/bootstrap { proxy_pass http://mxid_backend; }
    location = /api/v1/system/info      { proxy_pass http://mxid_backend; }

    # ---- Console SPA ----
    location /admin/ {
        alias /var/www/mxid/console/;
        # SPA fallback — React Router handles paths client-side.
        try_files $uri $uri/ /admin/index.html;
        # Hashed asset filenames → long cache.
        location ~* /admin/assets/.*\.(js|css|png|jpg|svg|woff2?|ico)$ {
            alias /var/www/mxid/console/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    location = /admin {
        return 301 /admin/;
    }

    # ---- Portal SPA (root catch-all) ----
    location / {
        root /var/www/mxid/portal;
        try_files $uri $uri/ /index.html;
        # Hashed asset filenames → long cache.
        location ~* /assets/.*\.(js|css|png|jpg|svg|woff2?|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
